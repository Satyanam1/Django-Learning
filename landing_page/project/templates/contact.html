{% extends 'base.html' %}

{% block content %}


<body>
    
    <p class="bg-green-500 rounded text-2xl">{{msg}}</p>
    <section class="min-h-screen flex items-center justify-center px-4">
        <div class="w-full max-w-lg bg-gray-800 p-8 rounded-xl shadow-lg">

            <h2 class="text-3xl font-semibold text-center  mb-6">Contact Us</h2>


            <form action="{% url 'contact_data' %}" method="post" class="space-y-3">
                {% csrf_token %}

                <div>
                    <label class="block mb-1 text-sm text-gray-300">Name</label>
                    <input type="text" name="name" placeholder="Enter Your name"
                        class="w-full px-4 py-2 rounded bg-gray-900 border border-gray-700 focus:outline-none focus:ring-2 focus:ring-pink-500">
                </div>

                <div>
                    <label class="block mb-1 text-sm text-gray-300">Email</label>
                    <input type="email" name="email" placeholder="Enter your email" class="w-full px-4 py-2 rounded bg-gray-900  border border-gray-700 focus:outline-none focus:ring-2 focus:ring-pink-500">
                </div>

              <div>
                <label class="block mb-1 text-sm text-gray-300">Message</label>
                <textarea name="Message" rows="4" placeholder="Write your message..." class="w-full px-4 py-2 rounded bg-gray-900 border border-gray-700 focus:outline-none focus:ring-2 focus:ring-pink-500"></textarea>
              </div> 
              
              <button type="submit"
                class="w-full bg-gray-900 py-2 rounded hover:bg-green-500 transition font-semibold">
                Send Message 
            </button>



            </form>

        </div>
    </section>



    <button id="contact" class="px-4 py-2 border bg-green-500  rounded mt-10 ">Click here</button>

    <script>
        const button = document.getElementById('contact');
        button.addEventListener('click', () => {
            window.alert("Hi satyanam")
        })
    </script>

    

</body>
{% endblock %}
